# GitHub Codespaces（および HTTPS リバースプロキシ）配下で a-blog cms を正しく動かすための Apache 設定。
#
# 問題: Codespaces はコンテナ内部ポート(8080)を Host ヘッダに付けて渡すため、
#       a-blog cms が ":8080" 付きの絶対URL（例 https://xxx.app.github.dev:8080/setup/...）
#       を生成し、外部が 443 で公開される Codespaces ドメインでは 404 になる。
# 対策: 外部が HTTPS（X-Forwarded-Proto: https）のリクエストに限り、Host からポートを除去する。
#       これにより a-blog cms は https://xxx.app.github.dev/... という正しいURLを生成する。
#       ローカルの http://localhost:8080 では X-Forwarded-Proto が無いので影響しない。
<IfModule mod_setenvif.c>
  SetEnvIf X-Forwarded-Proto "^https$" ACMS_HTTPS_PROXY=1
</IfModule>
<IfModule mod_headers.c>
  RequestHeader edit Host "^(.*):[0-9]+$" "$1" env=ACMS_HTTPS_PROXY
</IfModule>
